<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inline theme script: runs synchronously before first paint to prevent flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kea-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kutaisi English Academy — Learn English with confidence. Professional courses for all levels in Kutaisi, Georgia." />
    <meta name="keywords" content="English Academy, Kutaisi, English courses, language learning, Georgia" />
    <title>Kutaisi English Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Georgian:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
